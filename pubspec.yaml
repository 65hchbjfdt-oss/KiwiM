name: kiwimusic
description: KiwiMusic Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  glassmorphism: ^3.0.0
  flutter_blurhash: ^1.3.0
  just_audio: ^0.9.48
  just_audio_web: ^0.1.0          # обязательно для звука в веб
  supabase_flutter: ^2.12.0
  universal_html: ^2.2.4           # для dart:html на web
  http: ^1.2.2                     # если будешь добавлять Jamendo

flutter:
  uses-material-design: true